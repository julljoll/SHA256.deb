# electron-react-vite-tailwind-deb-packaging.yml
skill:
  id: "electron-deb-ubuntu-packaging"
  name: "Empaquetado Electron + React + Vite + Tailwind para .deb en Ubuntu"
  version: "2.1.0"
  description: >
    Manual de buenas prácticas para construir, empaquetar y validar aplicaciones Electron
    desarrolladas con React + Vite + Tailwind CSS en paquetes .deb estables para Ubuntu/Debian.
    Incluye configuración de rutas, dependencias, seguridad, validación y troubleshooting.
  target_os: ["Ubuntu 20.04+", "Debian 11+", "Linux Mint 21+"]
  stack: ["React 18+", "Vite 5+", "TailwindCSS 3+", "Electron 28+", "electron-builder 24+"]

prerequisites:
  - "Node.js LTS (18.x o 20.x)"
  - "npm, yarn o pnpm configurado globalmente"
  - "electron-builder como devDependency: npm i -D electron-builder"
  - "Paquetes de desarrollo en Ubuntu: sudo apt install -y libgtk-3-dev libnss3-dev libxss-dev libasound2-dev"
  - "Conocimiento básico de rutas relativas vs absolutas en Electron"

configuration_templates:
  vite.config.js: |
    import { defineConfig } from 'vite'
    import react from '@vitejs/plugin-react'
    import { resolve } from 'path'

    export default defineConfig({
      plugins: [react()],
      // Crítico para Electron: rutas relativas en producción
      base: process.env.NODE_ENV === 'production' ? './' : '/',
      build: {
        outDir: 'dist',
        emptyOutDir: true,
        rollupOptions: {
          // Evita advertencias de módulos internos de Electron
          external: ['electron']
        }
      },
      resolve: {
        alias: {
          '@': resolve(__dirname, 'src')
        }
      }
    })

  electron-builder.yml: |
    appId: com.tuempresa.tuapp
    productName: "TuApp"
    directories:
      output: release
      buildResources: build
    files:
      - "dist/**/*"
      - "electron/**/*"
      - "package.json"
    linux:
      target:
        - target: deb
          arch: ["x64"]
      category: "Utility"
      maintainer: "tu@email.com"
      depends:
        - "libgtk-3-0"
        - "libnss3"
        - "libxss1"
        - "libasound2"
        - "libx11-xcb1"
        - "xdg-utils"
        - "libgbm1"
        - "libdrm2"
      desktop:
        Name: "TuApp"
        Exec: "tuapp %U"
        Icon: "tuapp"
        Categories: "Utility;"
        StartupWMClass: "tuapp"
        # Soporte opcional para Wayland
        Keywords: "electron;react;vite"
      icon: "build/icon.png"

  desktop_entry.desktop: |
    [Desktop Entry]
    Name=TuApp
    Exec=/opt/TuApp/tuapp --enable-features=UseOzonePlatform --ozone-platform=wayland %U
    Icon=/opt/TuApp/resources/app/build/icon.png
    Type=Application
    Categories=Utility;
    StartupWMClass=TuApp
    Terminal=false
    MimeType=x-scheme-handler/tuapp;

best_practices:
  project_structure:
    - "Mantén separado el proceso principal (electron/main.js) del renderer (src/)"
    - "Nunca mezcles dependencias de Node/Electron en el código de React/Vite"
    - "Usa 'build/' para iconos, assets estáticos y archivos .desktop"
    - "Define 'main': 'electron/main.js' en package.json"

  build_and_assets:
    - "Siempre ejecuta 'npm run build' (Vite) ANTES de 'electron-builder'"
    - "Usa 'import.meta.url' y 'fileURLToPath' en lugar de __dirname en ESModules"
    - "Para cargar el renderer en producción: 
      const preloadPath = path.join(path.dirname(fileURLToPath(import.meta.url)), 'preload.js')
      const indexPath = path.join(path.dirname(fileURLToPath(import.meta.url)), 'dist/index.html')"
    - "Evita 'require()' en el renderer; usa 'window.electronAPI' expuesto desde preload"

  deb_packaging:
    - "electron-builder genera automáticamente el .deb con estructura /opt/<AppName>/"
    - "No modifiques manualmente scripts 'postinst/postrm' a menos que sea estrictamente necesario"
    - "Usa 'linux.depends' para declarar librerías nativas; evita omitir libdrm2/libgbm1 (acelera GPU)"
    - "Si usas auto-updater, prefiera AppImage o formato Snap; los .deb nativos no soportan actualización incremental sin repositorio apt"

  security:
    - "contextIsolation: true"
    - "nodeIntegration: false"
    - "sandbox: true"
    - "webSecurity: true"
    - "Expón solo los módulos necesarios mediante contextBridge en preload"
    - "Valida URLs externas con 'shell.openExternal()' en lugar de 'window.open()'"

  runtime_compatibility:
    - "Ubuntu 22.04+ usa Wayland por defecto. Añade '--ozone-platform=wayland' si hay problemas de renderizado"
    - "Si la app falla en sandbox de Ubuntu: añade '--no-sandbox' SOLO para diagnóstico; nunca para producción"
    - "Usa 'app.disableHardwareAcceleration()' solo si hay crashes gráficos persistentes"

troubleshooting:
  - error: "Cannot find module 'electron' or 'vite'"
    cause: "Vite intenta empaquetar dependencias de devDependencies o el build se ejecutó antes de tiempo"
    fix: "Verifica que 'npm run build' genere 'dist/' correctamente. Asegura que 'files' en electron-builder incluya solo lo necesario."

  - error: "GLib-GIO-CRITICAL / Unable to connect to D-Bus"
    cause: "Falta xdg-utils o la app se ejecuta sin entorno de sesión gráfica"
    fix: "Añade 'xdg-utils' a linux.depends. Verifica que se ejecute desde sesión de usuario, no con sudo."

  - error: "Failed to load resource: net::ERR_FILE_NOT_FOUND"
    cause: "Rutas Vite incorrectas en producción"
    fix: "Confirma 'base: './'' en vite.config.js. Usa rutas relativas './assets/img.png' o importaciones dinámicas."

  - error: "Sandbox violation / FATAL:electron_main_delegate.cc"
    cause: "Ubuntu AppArmor/Seccomp bloquea ejecución sin sandbox explícito"
    fix: "Habilita sandbox: true en webPreferences. Si falla, añade '--enable-sandbox' en args o usa '--no-sandbox' temporalmente."

  - error: "Wayland: ventana transparente o parpadeo"
    cause: "Falta configuración Ozone"
    fix: "Añade '--enable-features=UseOzonePlatform --ozone-platform=wayland' en Exec del .desktop o en app.commandLine.appendSwitch() en main.js"

validation_checklist:
  - [ ] "npm run build genera dist/ sin warnings de módulos no encontrados"
  - [ ] "electron-builder produce release/*.deb sin errores de empaquetado"
  - [ ] "dpkg -I release/*.deb muestra depends correctos y maintainer"
  - [ ] "Instalación limpia: sudo apt install -f ./release/*.deb (sin conflictos de librerías)"
  - [ ] "Ejecución desde menú de aplicaciones y terminal sin mensajes de error críticos"
  - [ ] "Verificación de seguridad: 'npm audit', 'npx electron-builder --linux --publish never'"
  - [ ] "Prueba en VM Ubuntu limpia (sin dev tools instalados)"
  - [ ] "Tailwind funciona correctamente en producción (no hay clases faltantes)"
  - [ ] "Icono y archivo .desktop visibles en GNOME/KDE"
  - [ ] "Actualización manual probada: desinstalar + reinstalar sin perder datos de usuario (~/.config/<AppName>)"

ci_cd_recommendations:
  - "Usa GitHub Actions con ubuntu-22.04"
  - "Cachea node_modules y dist/ para acelerar builds"
  - "Firma .deb con debsign si se publicará en repositorio apt"
  - "Valida con 'lintian release/*.deb' para cumplir políticas Debian"
  - "Genera también AppImage como fallback para distribuciones no .deb"

references:
  - "https://www.electron.build/"
  - "https://vitejs.dev/config/"
  - "https://www.electronjs.org/docs/latest/tutorial/security"
  - "https://wiki.debian.org/Wayland"
  - "https://github.com/electron-userland/electron-builder/issues"

notes_for_ai:
  - "Este skill debe usarse como referencia estructurada para generar configs, diagnosticar logs de build, o validar pipelines."
  - "Prioriza siempre 'contextIsolation: true' y rutas relativas en producción."
  - "Evita sugerir 'electron-packager' o 'npm scripts manuales'; electron-builder es el estándar para .deb."
  - "Si el usuario reporta un error, cruza con la sección 'troubleshooting' antes de proponer soluciones genéricas."